version: '3.8'

services:
  habla:
    image: ghcr.io/pghart/habla:latest
    # Port not exposed to host — access via Cloudflare tunnel at http://habla:3000
    volumes:
      - sqlite_data:/app/data
    environment:
      # Infrastructure — set these in Portainer, do not commit values to GitHub
      DATABASE_URL: "file:/app/data/habla.db"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET}"
      NEXTAUTH_URL: "${NEXTAUTH_URL}"
      # API keys are configured through the in-app Admin → API Settings page
      # and stored encrypted in the database. No need to set them here.
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: "${CLOUDFLARE_TUNNEL_TOKEN}"
    depends_on:
      habla:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sqlite_data:
    driver: local
